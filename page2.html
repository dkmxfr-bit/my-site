<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>letter</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

* {
  font-family: "Press Start 2P", monospace;
}

body {
  margin: 0;
  min-height: 100vh;
  background: url("./pusheen.png") center/cover no-repeat;
  overflow: hidden;
}

/* плавное появление */
body {
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(1.02); }
  to { opacity: 1; transform: scale(1); }
}

/* кнопка музыки */
.music-btn {
  width: 90px;
  height: 90px;

  position: absolute;
  top: 80px;
  left: 10px;

  border: none;
  border-radius: 20px;

  background: url("./music.jpg") center/cover no-repeat;
  cursor: pointer;

  display: flex;
  justify-content: center;
  align-items: center;

  overflow: hidden;
}

/* затемнение */
.music-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.15);
}

/* иконка */
.icon {
  position: relative;
  z-index: 2;
}

/* текст */
.text {
  position: absolute;
  bottom: 8px;
  font-size: 10px;
  color: white;
  text-shadow: 0 2px 6px rgba(0,0,0,0.7);
}

/* сердцебиение */
@keyframes heartbeat {
  0% { transform: scale(1); }
  15% { transform: scale(1.1); }
  30% { transform: scale(1); }
  45% { transform: scale(1.15); }
  60% { transform: scale(1); }
  100% { transform: scale(1); }
}

.music-btn.playing {
  animation: heartbeat 1.8s infinite;
}

/* кнопка назад */
.back-btn {
  position: absolute;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);

  padding: 10px 22px;   /* меньше */
  font-size: 12px;      /* меньше */

  border-radius: 20px;
  border: none;

  background: rgba(255,255,255,0.5);
  cursor: pointer;

  transition: 0.3s;
}

.back-btn:hover {
  transform: translateX(-50%) scale(1.05);
}

.back-btn:hover {
  transform: translateX(-50%) scale(1.05);
}

</style>
</head>

<body>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- МУЗЫКА -->
<button class="music-btn" onclick="toggleMusic()">

  <div class="icon">

    <svg id="playIcon" width="50" height="50" viewBox="0 0 24 24" fill="white">
      <path d="M8 5v14l11-7z"/>
    </svg>

    <svg id="pauseIcon" width="50" height="50" viewBox="0 0 24 24" fill="white" style="display:none;">
      <path d="M6 5h4v14H6zm8 0h4v14h-4z"/>
    </svg>

  </div>

  <div class="text">тапни (ฅ´ω`ฅ)</div>

</button>

<!-- НАЗАД -->
<button class="back-btn" onclick="location.href='index.html'">
назад
</button>

<script>
const music = document.getElementById("music");
const btn = document.querySelector(".music-btn");
const playIcon = document.getElementById("playIcon");
const pauseIcon = document.getElementById("pauseIcon");

function toggleMusic() {
  if (music.paused) {
    music.play();
    btn.classList.add("playing");
    playIcon.style.display = "none";
    pauseIcon.style.display = "block";
  } else {
    music.pause();
    btn.classList.remove("playing");
    playIcon.style.display = "block";
    pauseIcon.style.display = "none";
  }
}
</script>

</body>
</html>
