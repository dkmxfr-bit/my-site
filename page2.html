<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<title>letter</title><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"><style>

/* 🌙 пиксельный шрифт */
* {
  font-family: "Press Start 2P", monospace;
}

body {
  position: relative;
  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;

  background: url("./pusheen.png") center/cover no-repeat;

  animation: fadeIn 1s ease;
}

/* плавное появление */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: scale(1.02);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* дыхание фона */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: inherit;
  animation: bgBreath 6s infinite ease-in-out;
  z-index: -1;
}

@keyframes bgBreath {
  0%,100% { filter: brightness(1); }
  50% { filter: brightness(0.9); }
}

/* сердцебиение */
@keyframes heartbeat {
  0% { transform: scale(1); }

  10% { transform: scale(1.08); }
  18% { transform: scale(1); }

  26% { transform: scale(1.12); }
  34% { transform: scale(1); }

  55% { transform: scale(1); }

  68% { transform: scale(1.15); }
  80% { transform: scale(1); }

  100% { transform: scale(1); }
}

/* свечение */
@keyframes glow {
  0% { box-shadow: 0 0 0 rgba(255,255,255,0); }
  50% { box-shadow: 0 0 25px rgba(255,255,255,0.35); }
  100% { box-shadow: 0 0 0 rgba(255,255,255,0); }
}

/* 🎵 кнопка музыки */
.music-btn {
  width: 170px;
  height: 170px;

  background: url("./music.jpg") center/cover no-repeat;

  border-radius: 20px;
  border: none;

  cursor: pointer;

  position: absolute;
  top: 25px;
  left: 25px;

  overflow: hidden;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.music-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.08);
}

.music-btn.playing {
  animation: heartbeat 2.4s infinite ease-in-out,
             glow 2.4s infinite;
}

.icon {
  position: relative;
  z-index: 2;
}

.text {
  position: relative;
  z-index: 2;

  color: white;
  font-size: 10px;

  margin-top: 8px;

  text-shadow: 0 2px 6px rgba(0,0,0,0.7);
}

/* 🔘 кнопка назад */
.back-btn {
  position: absolute;
  bottom: 40px;

  padding: 24px 55px;
  font-size: 20px;

  border-radius: 30px;
  border: 1px solid rgba(0,0,0,0.2);

  background: rgba(255,255,255,0.4);

  cursor: pointer;
  transition: 0.3s;

  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}

.back-btn:hover {
  transform: scale(1.05);
}

</style></head><body><audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio><button class="music-btn" onclick="toggleMusic()">  <div class="icon"><svg id="playIcon"
     xmlns="http://www.w3.org/2000/svg"
     width="50"
     height="50"
     fill="white"
     viewBox="0 0 24 24">
  <path d="M8 5v14l11-7z"/>
</svg>

<svg id="pauseIcon"
     xmlns="http://www.w3.org/2000/svg"
     width="50"
     height="50"
     fill="white"
     viewBox="0 0 24 24"
     style="display:none;">
  <path d="M6 5h4v14H6zm8 0h4v14h-4z"/>
</svg>

  </div>  <div class="text">тапни :PP</div></button><button class="back-btn" onclick="location.href='index.html'">
назад
</button><script>
const music = document.getElementById("music");
const playIcon = document.getElementById("playIcon");
const pauseIcon = document.getElementById("pauseIcon");
const btn = document.querySelector(".music-btn");

function toggleMusic() {
  if (music.paused) {
    music.play();
    playIcon.style.display = "none";
    pauseIcon.style.display = "block";
    btn.classList.add("playing");
  } else {
    music.pause();
    playIcon.style.display = "block";
    pauseIcon.style.display = "none";
    btn.classList.remove("playing");
  }
}
</script></body>
</html>
