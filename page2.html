<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>letter</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

* {
  font-family: "Press Start 2P", monospace;
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  overflow: hidden;

  background: url("./pusheen.png") center/cover no-repeat;

  animation: fadeIn 1s ease;
}

/* появление */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ===================== */
/* 🎵 КНОПКА МУЗЫКИ */
/* ===================== */

.music-btn {
  width: 105px;
  height: 105px;

  position: absolute;
  top: 125px;
  left: 8px;

  border: none;
  border-radius: 18px;

  background: url("./music.jpg") center/cover no-repeat;
  cursor: pointer;

  display: flex;
  justify-content: center;
  align-items: center;

  overflow: hidden;
}

/* затемнение */
.music-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.2);
}

/* иконка */
.icon {
  position: relative;
  z-index: 2;
}

/* текст */
.text {
  position: absolute;
  bottom: 6px;
  left: 0;
  right: 0;

  font-size: 12px;
  color: white;
  text-shadow: 0 2px 6px rgba(0,0,0,0.7);

  display: flex;
  flex-direction: column;
  align-items: center;

  line-height: 1.2;
  pointer-events: none;
}


/* сердцебиение */
@keyframes heartbeat {
  0% { transform: scale(1); }
  20% { transform: scale(1.1); }
  40% { transform: scale(1); }
  60% { transform: scale(1.12); }
  80% { transform: scale(1); }
  100% { transform: scale(1); }
}

.music-btn.playing {
  animation: heartbeat 1.8s infinite;
}

/* ===================== */
/* 🔙 КНОПКА НАЗАД */
/* ===================== */

.back-btn {
  position: absolute;
  bottom: 180px;
  left: 50%;

  transform: translateX(-50%);

  padding: 12px 26px;
  font-size: 12px;

  border-radius: 18px;
  border: none;

  background: rgba(255,255,255,0.5);
  cursor: pointer;

  transition: background 0.2s ease, transform 0.2s ease;
}

/* без рывков */
.back-btn:hover {
  background: rgba(255,255,255,0.65);
}

.back-btn:active {
  transform: translateX(-50%) scale(0.96);
}

</style>
</head>

<body>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🎵 кнопка музыки -->
<button class="music-btn" onclick="toggleMusic()">

  <div class="icon">

    <svg id="playIcon" width="35" height="35" viewBox="0 0 24 24" fill="white">
      <path d="M8 5v14l11-7z"/>
    </svg>

    <svg id="pauseIcon" width="35" height="35" viewBox="0 0 24 24" fill="white" style="display:none;">
      <path d="M6 5h4v14H6zm8 0h4v14h-4z"/>
    </svg>

  </div>

  <div class="text">
  тапни
  <span>(ฅ´ω`ฅ)</span>
  </div>

</button>

<!-- 🔙 назад -->
<button class="back-btn" onclick="location.href='index.html'">
назад
</button>

<script>

const music = document.getElementById("music");
const btn = document.querySelector(".music-btn");
const playIcon = document.getElementById("playIcon");
const pauseIcon = document.getElementById("pauseIcon");

function toggleMusic() {
  if (music.paused) {
    music.play();
    btn.classList.add("playing");
    playIcon.style.display = "none";
    pauseIcon.style.display = "block";
  } else {
    music.pause();
    btn.classList.remove("playing");
    playIcon.style.display = "block";
    pauseIcon.style.display = "none";
  }
}

</script>

</body>
</html>
